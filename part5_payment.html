<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Meesho - Payment</title>
<style>
body { font-family: Arial, sans-serif; background:#f5f5f5; margin:0; padding:20px; display:flex; justify-content:center; }
.payment-container { background:white; padding:25px; border-radius:10px; width:350px; box-shadow:0 4px 8px rgba(0,0,0,0.15); text-align:center; }
.payment-container h2 { margin-bottom:15px; }
.payment-container p { margin-bottom:10px; }
.payment-container input, .payment-container select { width:100%; padding:8px; margin-bottom:10px; border-radius:5px; border:1px solid #ccc; }
.payment-container button { width:100%; padding:12px; border:none; border-radius:5px; background: linear-gradient(135deg,#ff6a00,#ee0979); color:white; cursor:pointer; font-weight:600; transition:0.3s; }
.payment-container button:hover { transform:scale(1.05); }
.payment-container button:focus { outline:2px solid #000; }
</style>
</head>
<body>

<div class="payment-container">
  <h2>Payment</h2>
  <p id="prod-name">Product: Example</p>
  <p>Price: ₹<span id="prod-price">0</span></p>

  <div id="user-details-form">
    <input type="text" id="user-name" placeholder="Enter Name" required>
    <input type="tel" id="user-phone" placeholder="Enter Phone" required>
    <input type="text" id="user-address" placeholder="Enter Address" required>
  </div>

  <select id="payment-method">
    <option value="COD">Cash on Delivery</option>
    <option value="UPI">UPI</option>
    <option value="Card">Card</option>
  </select>

  <button id="confirm-order">Confirm Order</button>
</div>

<script>
// Product info from query params
const params = new URLSearchParams(window.location.search);
const name = params.get('name') || 'Product Name';
const price = params.get('price') || '499';
const category = params.get('category') || 'Example Category';
document.getElementById('prod-name').innerText = `Product: ${name}`;
document.getElementById('prod-price').innerText = price;

// Pre-fill user info if exists
let user = JSON.parse(localStorage.getItem('user')||'null');
if(user){
  document.getElementById('user-name').value = user.name || user.username;
  document.getElementById('user-phone').value = user.phone || '';
  document.getElementById('user-address').value = user.address || '';
}

// Confirm Order
document.getElementById('confirm-order').addEventListener('click', ()=>{
  const uname = document.getElementById('user-name').value.trim();
  const uphone = document.getElementById('user-phone').value.trim();
  const uaddr = document.getElementById('user-address').value.trim();
  const method = document.getElementById('payment-method').value;

  if(!uname || !uphone || !uaddr){ alert('Please fill all fields'); return; }

  // Save user details in localStorage once
  localStorage.setItem('user', JSON.stringify({username:uname, phone:uphone, address:uaddr}));

  // Save order in localStorage
  let orders = JSON.parse(localStorage.getItem('orders')||'[]');
  orders.push({product:name, price:price, category:category, method:method, user:uname, date:new Date().toLocaleString()});
  localStorage.setItem('orders', JSON.stringify(orders));

  alert('Order Confirmed!');
  window.location.href = 'part6_order_success.html';
});
</script>

</body>
</html>
