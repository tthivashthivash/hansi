<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meesho Clone - Payment</title>
<style>
body { font-family: Arial, sans-serif; background:#f5f5f5; padding:20px; display:flex; justify-content:center; }
.payment-container { background:white; padding:20px; border-radius:10px; width:350px; box-shadow:0 4px 8px rgba(0,0,0,0.1); }
.payment-container h2 { margin-bottom:15px; text-align:center; }
.payment-container label { display:block; margin-top:10px; }
.payment-container select, .payment-container input { width:100%; padding:8px; margin-top:5px; border-radius:5px; border:1px solid #ccc; }
.payment-container button { margin-top:15px; width:100%; padding:10px; border:none; border-radius:5px; background: linear-gradient(135deg,#ff6a00,#ee0979); color:white; cursor:pointer; }
.payment-container button:focus { outline:2px solid #000; }
</style>
</head>
<body>

<div class="payment-container">
  <h2>Payment</h2>
  <form id="payment-form">
    <label for="payment-method">Payment Method</label>
    <select id="payment-method" required>
      <option value="">Select</option>
      <option value="COD">Cash on Delivery</option>
      <option value="UPI">UPI</option>
      <option value="Card">Credit/Debit Card</option>
    </select>

    <label for="amount">Amount (₹)</label>
    <input type="number" id="amount" placeholder="Enter amount" required min="1">

    <button type="submit">Confirm Payment</button>
  </form>
</div>

<script>
const paymentForm = document.getElementById('payment-form');
paymentForm.addEventListener('submit', e => {
  e.preventDefault();
  const method = document.getElementById('payment-method').value;
  const amount = document.getElementById('amount').value;
  alert(`Payment of ₹${amount} via ${method} confirmed!`);
  // Redirect to Order Success page
  window.location.href = 'part6_order_success.html';
});
</script>

</body>
</html>
