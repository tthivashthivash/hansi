<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meesho Clone - Payment</title>
<style>
body { font-family: Arial, sans-serif; background:#f5f5f5; display:flex; justify-content:center; padding:20px; }
.payment-container { background:white; padding:25px; border-radius:10px; width:350px; box-shadow:0 4px 8px rgba(0,0,0,0.15); }
.payment-container h2 { text-align:center; margin-bottom:15px; }
.payment-container p { margin-bottom:10px; font-weight:600; }
.payment-container select, .payment-container input { width:100%; padding:8px; margin-top:5px; border-radius:5px; border:1px solid #ccc; }
button { width:100%; padding:12px; border:none; border-radius:5px; margin-top:15px; background: linear-gradient(135deg,#ff6a00,#ee0979); color:white; font-weight:600; cursor:pointer; transition:0.3s; }
button:hover { transform:scale(1.05); }
button:focus { outline:2px solid #000; }
</style>
</head>
<body>

<div class="payment-container">
  <h2>Payment</h2>
  <p id="product-info">Product: Example | Price: ₹0</p>

  <label for="payment-method">Payment Method</label>
  <select id="payment-method" required>
    <option value="">Select Payment Method</option>
    <option value="COD">Cash on Delivery</option>
    <option value="UPI">UPI</option>
    <option value="Card">Credit/Debit Card</option>
  </select>

  <button id="confirm-payment">Confirm Payment</button>
</div>

<script>
// Get product info from query params
const params = new URLSearchParams(window.location.search);
const name = params.get('name') || 'Example Product';
const price = params.get('price') || '0';
document.getElementById('product-info').innerText = `Product: ${name} | Price: ₹${price}`;

// Confirm Payment → Order Success
document.getElementById('confirm-payment').addEventListener('click', () => {
  const method = document.getElementById('payment-method').value;
  if(!method) { alert('Please select a payment method!'); return; }
  alert(`Payment of ₹${price} via ${method} confirmed!`);
  // Pass product info to Order Success page if needed
  window.location.href = 'part6_order_success.html';
});
</script>

</body>
</html>
