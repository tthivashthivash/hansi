<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Meesho - Home</title>
<style>
body { font-family: Arial, sans-serif; background:#f5f5f5; margin:0; padding:0; }
nav { background: linear-gradient(135deg,#6a11cb,#2575fc); padding:10px; display:flex; justify-content:space-around; position:sticky; top:0; }
nav a { color:white; text-decoration:none; font-weight:600; font-size:0.9rem; }
h2 { text-align:center; margin:15px 0; }
.products { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:15px; padding:20px; }
.product-card { background:white; padding:10px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); display:flex; flex-direction:column; align-items:center; transition:transform 0.2s; cursor:pointer; }
.product-card:hover { transform:scale(1.05); }
.product-card img { width:100%; border-radius:8px; }
.product-card button { margin-top:10px; padding:8px 10px; border:none; border-radius:5px; background: linear-gradient(135deg,#ff6a00,#ee0979); color:white; cursor:pointer; font-weight:600; }
</style>
</head>
<body>

<nav>
  <a href="part1_index.html">Home</a>
  <a href="part10_order_history.html">My Orders</a>
  <a href="part8_wishlist.html">Wishlist</a>
  <a href="part7_profile.html">Profile</a>
</nav>

<h2>Products</h2>

<div class="products" id="product-list">
  <!-- Products populated by JS -->
</div>

<script>
// Sample products array
const products = [
  {name:"Product 1", price:499, category:"Clothing", img:"https://via.placeholder.com/150"},
  {name:"Product 2", price:299, category:"Accessories", img:"https://via.placeholder.com/150"},
  {name:"Product 3", price:399, category:"Footwear", img:"https://via.placeholder.com/150"},
  {name:"Product 4", price:599, category:"Bags", img:"https://via.placeholder.com/150"},
  {name:"Product 5", price:199, category:"Jewelry", img:"https://via.placeholder.com/150"}
];

// Populate products
const productList = document.getElementById('product-list');
products.forEach((p,i)=>{
  const card = document.createElement('div');
  card.className = 'product-card';
  card.tabIndex = 0; // focusable
  card.innerHTML = `
    <img src="${p.img}" alt="${p.name}">
    <p>${p.name}</p>
    <p>₹${p.price}</p>
    <button>Buy Now</button>
  `;
  // Click product → go to product details
  card.querySelector('button').addEventListener('click',()=>{
    const url = `part4_product.html?name=${encodeURIComponent(p.name)}&price=${p.price}&category=${encodeURIComponent(p.category)}`;
    window.location.href = url;
  });
  productList.appendChild(card);
});
</script>

</body>
</html>
