<!-- part1_index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meesho Clone - Home</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Arial, sans-serif; background:#f5f5f5; }
.products { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:15px; padding:20px; }
.product-card { background:white; padding:10px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); display:flex; flex-direction:column; align-items:center; transition:transform 0.2s; cursor:pointer; }
.product-card:hover { transform:scale(1.05); }
.product-card img { width:100%; border-radius:8px; }
.product-card button { margin-top:10px; padding:8px 10px; border:none; border-radius:5px; background: linear-gradient(135deg,#ff6a00,#ee0979); color:white; cursor:pointer; }
</style>
</head>
<body>

<h2 style="text-align:center; margin:20px 0;">Welcome to Meesho Clone</h2>

<div class="products">
  <div class="product-card" onclick="openProduct('Product 1','499','Example Category')">
    <img src="https://via.placeholder.com/150" alt="Product 1">
    <p>Product 1</p>
  </div>
  <div class="product-card" onclick="openProduct('Product 2','299','Example Category')">
    <img src="https://via.placeholder.com/150" alt="Product 2">
    <p>Product 2</p>
  </div>
  <div class="product-card" onclick="openProduct('Product 3','399','Example Category')">
    <img src="https://via.placeholder.com/150" alt="Product 3">
    <p>Product 3</p>
  </div>
</div>

<script>
// Product click → redirect to product details with query params
function openProduct(name, price, category){
  const url = `part4_product.html?name=${encodeURIComponent(name)}&price=${price}&category=${encodeURIComponent(category)}`;
  window.location.href = url;
}
</script>

</body>
</html>
