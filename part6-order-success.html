<script src="script.js"></script>
<script>
  // Example: simple animation fade-in
  document.addEventListener('DOMContentLoaded', () => {
    const scooter = document.querySelector('.scooter-animation');
    scooter.style.opacity = 0;
    setTimeout(() => { scooter.style.transition = 'opacity 1.5s'; scooter.style.opacity = 1; }, 100);
  });
</script>
