<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meesho Clone - Product</title>
<style>
body { font-family: Arial, sans-serif; background:#f5f5f5; padding:20px; }
.product-container { max-width:600px; margin:auto; background:white; padding:20px; border-radius:10px; box-shadow:0 4px 8px rgba(0,0,0,0.1); }
.product-container img { width:100%; border-radius:8px; }
.product-container h2 { margin:15px 0 10px; }
.product-container p { margin-bottom:10px; }
button { padding:10px; border:none; border-radius:5px; background: linear-gradient(135deg,#ff6a00,#ee0979); color:white; cursor:pointer; }
button:focus { outline:2px solid #000; }
</style>
</head>
<body>

<div class="product-container">
  <img src="https://via.placeholder.com/400x300" alt="Product Image">
  <h2>Product Name</h2>
  <p>Category: Example Category</p>
  <p>Price: ₹499</p>
  <p>Description: Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse vitae.</p>
  <button id="add-to-cart">Add to Cart</button>
</div>

<script>
const addToCartBtn = document.getElementById('add-to-cart');
addToCartBtn.addEventListener('click', () => {
  alert('Product added to cart!');
});
</script>

</body>
</html>>
