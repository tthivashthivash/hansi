<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Meesho - Product Details</title>
<style>
body { font-family: Arial, sans-serif; background:#f5f5f5; margin:0; padding:20px; }
nav { background: linear-gradient(135deg,#6a11cb,#2575fc); padding:10px; display:flex; justify-content:space-around; position:sticky; top:0; }
nav a { color:white; text-decoration:none; font-weight:600; font-size:0.9rem; }
.container { max-width:1000px; margin:auto; display:flex; flex-direction:column; gap:20px; }
.product-main { display:flex; flex-direction:column; background:white; padding:20px; border-radius:10px; box-shadow:0 4px 8px rgba(0,0,0,0.15); text-align:center; }
.product-main img { width:100%; border-radius:8px; max-width:400px; margin:auto; }
.product-main h2 { margin:15px 0 10px; }
.product-main p { margin-bottom:10px; }
.product-main button { padding:12px 20px; margin:5px; border:none; border-radius:5px; background: linear-gradient(135deg,#ff6a00,#ee0979); color:white; cursor:pointer; font-weight:600; transition:0.3s; }
.product-main button:hover { transform:scale(1.05); }
.product-main button:focus { outline:2px solid #000; }

.related-products { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:15px; }
.related-card { background:white; padding:10px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); display:flex; flex-direction:column; align-items:center; transition:transform 0.2s; cursor:pointer; }
.related-card:hover { transform:scale(1.05); }
.related-card img { width:100%; border-radius:8px; }
.related-card button { margin-top:10px; padding:8px 10px; border:none; border-radius:5px; background: linear-gradient(135deg,#ff6a00,#ee0979); color:white; cursor:pointer; font-weight:600; }
</style>
</head>
<body>

<nav>
  <a href="part1_index.html">Home</a>
  <a href="part10_order_history.html">My Orders</a>
  <a href="part8_wishlist.html">Wishlist</a>
  <a href="part7_profile.html">Profile</a>
</nav>

<div class="container">
  <div class="product-main">
    <img id="product-img" src="https://via.placeholder.com/400x300" alt="Product Image">
    <h2 id="product-name">Product Name</h2>
    <p>Category: <span id="product-category">Example Category</span></p>
    <p>Price: ₹<span id="product-price">499</span></p>
    <p id="product-desc">This is a short description of the product. Stylish, high-quality, and affordable!</p>
    <button id="buy-now">Buy Now</button>
    <button id="add-cart">Add to Cart</button>
  </div>

  <h3>More Products</h3>
  <div class="related-products" id="related-list">
    <!-- Related products populated by JS -->
  </div>
</div>

<script>
// Current product info from query params
const params = new URLSearchParams(window.location.search);
const name = params.get('name') || 'Product Name';
const price = params.get('price') || '499';
const category = params.get('category') || 'Example Category';
document.getElementById('product-name').innerText = name;
document.getElementById('product-price').innerText = price;
document.getElementById('product-category').innerText = category;

// Sample related products
const relatedProducts = [
  {name:"Product 2", price:299, category:"Accessories", img:"https://via.placeholder.com/150"},
  {name:"Product 3", price:399, category:"Footwear", img:"https://via.placeholder.com/150"},
  {name:"Product 4", price:599, category:"Bags", img:"https://via.placeholder.com/150"},
  {name:"Product 5", price:199, category:"Jewelry", img:"https://via.placeholder.com/150"}
];

// Populate related products
const relatedList = document.getElementById('related-list');
relatedProducts.forEach(p=>{
  const card = document.createElement('div');
  card.className = 'related-card';
  card.tabIndex = 0;
  card.innerHTML = `
    <img src="${p.img}" alt="${p.name}">
    <p>${p.name}</p>
    <p>₹${p.price}</p>
    <button>Buy Now</button>
  `;
  card.querySelector('button').addEventListener('click', ()=>{
    const url = `part5_payment.html?name=${encodeURIComponent(p.name)}&price=${p.price}&category=${encodeURIComponent(p.category)}`;
    window.location.href = url;
  });
  relatedList.appendChild(card);
});

// Buy Now → Payment
document.getElementById('buy-now').addEventListener('click', ()=>{
  const paymentUrl = `part5_payment.html?name=${encodeURIComponent(name)}&price=${price}&category=${encodeURIComponent(category)}`;
  window.location.href = paymentUrl;
});

// Add to Cart
document.getElementById('add-cart').addEventListener('click', ()=>{
  let cart = JSON.parse(localStorage.getItem('cart')||"[]");
  cart.push({name:name, price:price, category:category});
  localStorage.setItem('cart', JSON.stringify(cart));
  alert(`${name} added to cart!`);
});
</script>

</body>
</html>
