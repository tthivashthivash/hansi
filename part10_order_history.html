<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meesho Clone - Order History</title>
<style>
body { font-family: Arial, sans-serif; background:#f5f5f5; padding:20px; }
h2 { text-align:center; margin-bottom:20px; }
table { width:90%; margin:auto; border-collapse: collapse; }
th, td { border:1px solid #ccc; padding:10px; text-align:center; }
th { background:#6a11cb; color:white; }
tr:nth-child(even) { background:#eee; }
</style>
</head>
<body>

<h2>Order History</h2>
<table>
  <thead>
    <tr>
      <th>Product</th>
      <th>Payment</th>
      <th>Status</th>
      <th>Name</th>
      <th>Phone</th>
      <th>Address</th>
    </tr>
  </thead>
  <tbody id="order-history">
    <tr>
      <td>Product 1</td>
      <td>COD</td>
      <td>Confirmed</td>
      <td>John Doe</td>
      <td>9876543210</td>
      <td>123 Main Street, City</td>
    </tr>
    <tr>
      <td>Product 2</td>
      <td>UPI</td>
      <td>Confirmed</td>
      <td>Jane Smith</td>
      <td>9123456780</td>
      <td>456 Market Road, City</td>
    </tr>
  </tbody>
</table>

</body>
</html>
