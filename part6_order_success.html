
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Meesho - Order Success</title>
<style>
body { font-family: Arial, sans-serif; background:#f5f5f5; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
.success-container { background:white; padding:30px 25px; border-radius:10px; width:350px; box-shadow:0 4px 8px rgba(0,0,0,0.15); text-align:center; }
.success-container h2 { color:green; margin-bottom:15px; }
.success-container p { margin-bottom:10px; }
.success-container button { padding:12px 20px; border:none; border-radius:5px; background: linear-gradient(135deg,#ff6a00,#ee0979); color:white; cursor:pointer; font-weight:600; transition:0.3s; }
.success-container button:hover { transform:scale(1.05); }
.success-container button:focus { outline:2px solid #000; }
</style>
</head>
<body>

<div class="success-container">
  <h2>✅ Order Confirmed!</h2>
  <p id="product-info">Product: Example</p>
  <p id="order-date">Order Date: --</p>
  <button onclick="goHome()">Back to Home</button>
</div>

<script>
// Get last order from localStorage
let orders = JSON.parse(localStorage.getItem('orders')||'[]');
if(orders.length > 0){
  const lastOrder = orders[orders.length-1];
  document.getElementById('product-info').innerText = `Product: ${lastOrder.product} | ₹${lastOrder.price}`;
  document.getElementById('order-date').innerText = `Order Date: ${lastOrder.date}`;
}

// Go back to Home
function goHome(){
  window.location.href = 'part1_index.html';
}
</script>

</body>
</html>
