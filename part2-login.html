<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Part 2 – Login Page</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Shop Developer Mode – Login</h1>
  <nav>
    <a href="part1-home.html">Home</a>
  </nav>
</header>

<main>
  <section aria-label="Login Form">
    <h2>Login</h2>
    <form action="part1-home.html" method="get">
      <label for="username">Username or Email:</label>
      <input type="text" id="username" name="username" required aria-required="true">

      <label for="password">Password:</label>
      <input type="password" id="password" name="password" required aria-required="true">

      <button type="submit">Login</button>
    </form>
    <p>Don't have an account? <a href="#">Sign up</a></p>
  </section>
</main>

<footer>
  <p>&copy; 2026 Shop Developer Mode. All rights reserved.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
