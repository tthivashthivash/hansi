<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Part 9 – Cart Page</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Shop Developer Mode – Cart</h1>
  <nav>
    <a href="part1-home.html">Home</a>
    <a href="part7-profile.html">Profile</a>
    <a href="part8-wishlist.html">Wishlist</a>
  </nav>
</header>

<main>
  <section aria-label="Shopping Cart">
    <h2>Your Cart</h2>
    <table>
      <thead>
        <tr>
          <th>Product</th>
          <th>Quantity</th>
          <th>Price</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Super Widget</td>
          <td><input type="number" value="2" min="1" aria-label="Quantity for Super Widget"></td>
          <td>₹3000</td>
          <td><button onclick="removeFromCart('Super Widget')">Remove</button></td>
        </tr>
        <tr>
          <td>Mega Gadget</td>
          <td><input type="number" value="1" min="1" aria-label="Quantity for Mega Gadget"></td>
          <td>₹2000</td>
          <td><button onclick="removeFromCart('Mega Gadget')">Remove</button></td>
        </tr>
      </tbody>
    </table>

    <p>Total: ₹5000</p>
    <a href="part5-payment.html"><button>Proceed to Payment</button></a>
  </section>
</main>

<footer>
  <p>&copy; 2026 Shop Developer Mode. All rights reserved.</p>
</footer>

<script src="script.js"></script>
<script>
  function removeFromCart(productName) {
    alert(${productName} removed from cart!);
  }
</script>

</body>
</html>
