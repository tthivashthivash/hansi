<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meesho Clone - Profile</title>
<style>
body { font-family: Arial, sans-serif; background:#f5f5f5; padding:20px; display:flex; justify-content:center; }
.profile-container { background:white; padding:20px; border-radius:10px; width:350px; box-shadow:0 4px 8px rgba(0,0,0,0.1); }
.profile-container h2 { text-align:center; margin-bottom:15px; }
.profile-container label { display:block; margin-top:10px; }
.profile-container input { width:100%; padding:8px; margin-top:5px; border-radius:5px; border:1px solid #ccc; }
.profile-container button { margin-top:15px; width:100%; padding:10px; border:none; border-radius:5px; background: linear-gradient(135deg,#ff6a00,#ee0979); color:white; cursor:pointer; }
.profile-container button:focus { outline:2px solid #000; }
</style>
</head>
<body>

<div class="profile-container">
  <h2>User Profile</h2>
  <form id="profile-form">
    <label for="user-name">Name</label>
    <input type="text" id="user-name" placeholder="Your Name" required>

    <label for="user-email">Email</label>
    <input type="email" id="user-email" placeholder="your@email.com" required>

    <label for="user-phone">Phone</label>
    <input type="tel" id="user-phone" placeholder="10-digit Mobile" pattern="[0-9]{10}" required>

    <button type="submit">Save Profile</button>
  </form>
</div>

<script>
const profileForm = document.getElementById('profile-form');
profileForm.addEventListener('submit', e => {
  e.preventDefault();
  alert('Profile saved successfully!');
});
</script>

</body>
</html>
