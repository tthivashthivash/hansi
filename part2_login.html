<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meesho Clone - Login</title>
<style>
body { font-family: Arial, sans-serif; background: linear-gradient(135deg,#6a11cb,#2575fc); display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
.login-container { background:white; color:black; padding:25px 30px; border-radius:10px; width:320px; box-shadow:0 4px 8px rgba(0,0,0,0.2); }
.login-container h2 { text-align:center; margin-bottom:20px; }
.login-container label { display:block; margin-top:10px; font-weight:600; }
.login-container input { width:100%; padding:8px; margin-top:5px; border-radius:5px; border:1px solid #ccc; }
.login-container button { width:100%; padding:10px; margin-top:20px; border:none; border-radius:5px; background: linear-gradient(135deg,#ff6a00,#ee0979); color:white; cursor:pointer; font-weight:600; font-size:1rem; transition:0.3s; }
.login-container button:hover { opacity:0.9; transform:scale(1.02); }
.login-container button:focus { outline:2px solid #000; }
</style>
</head>
<body>

<div class="login-container">
  <h2>Login</h2>
  <form id="login-form">
    <label for="username">Username</label>
    <input type="text" id="username" required placeholder="Enter Username">

    <label for="password">Password</label>
    <input type="password" id="password" required placeholder="Enter Password">

    <button type="submit">Login</button>
  </form>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', e => {
  e.preventDefault();
  const username = document.getElementById('username').value;
  alert(`Welcome ${username}! Login Successful.`);
  // Redirect to Home / Products
  window.location.href = 'part1_index.html';
});
</script>

</body>
</html>
